name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  formula:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: update homebrew
        run: brew update
      - name: register checkout as tap
        run: brew tap --custom-remote SkywardLab/sealsuite "$GITHUB_WORKSPACE"
      - name: style formula
        run: brew style SkywardLab/sealsuite/sealsuite
      - name: audit formula
        run: brew audit --strict SkywardLab/sealsuite/sealsuite
      - name: install formula
        run: brew install SkywardLab/sealsuite/sealsuite
      - name: test formula
        run: brew test sealsuite
      - name: inspect service definition
        run: brew services info sealsuite
